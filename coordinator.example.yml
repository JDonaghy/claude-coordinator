# Example coordinator.yml — copy to coordinator.yml and edit for your setup.
# Generate one interactively with: coord init

repos:
  - name: vimcode
    github: JDonaghy/vimcode
    depends_on: [quadraui]
    default_branch: develop
    build_command: "cargo build"
    test_command: "cargo test --no-default-features"

  - name: quadraui
    github: JDonaghy/quadraui
    depends_on: []
    default_branch: main
    build_command: "cargo build --features tui --features gtk"
    test_command: "cargo test --features tui"
    # #305: stash compiled binaries before the worktree is removed so
    # `coord pull-artifact` can rsync them to the coordinator machine
    # for manual smoke testing without a local rebuild.
    artifact_paths:
      - target/debug/examples/tui_*
      - target/debug/examples/gtk_*
      - target/debug/coord-tui

  - name: claude-coordinator
    github: JDonaghy/claude-coordinator
    depends_on: []
    default_branch: main
    # #402: build a wheel into a throwaway dir — do NOT `pip install -e .`
    # into ~/.coord-venv. `coord test` runs build_command in the canonical
    # checkout, so an editable install pinned the AGENT's runtime venv to
    # whatever branch was checked out, silently reverting its PyPI install.
    # `pip wheel` exercises the full build backend without mutating any venv,
    # and still uses ~/.coord-venv/bin/pip so PEP 668 ("externally-managed-
    # environment" when pip resolves to /usr/bin/pip) doesn't bite.
    build_command: "~/.coord-venv/bin/pip wheel --no-deps --wheel-dir /tmp/coord-test-build ."
    # test_command omitted: pytest isn't installed in ~/.coord-venv
    # (runtime-only) and the human Test gate (#200) handles verification.
    # artifact_paths: []  # no compiled binaries to stash for a Python package

machines:
  # Desktop A — Dell Precision, full GTK builds
  - name: precision
    host: john-precision-3571
    capabilities: [gtk, rust, python]
    repos: [vimcode, quadraui, claude-coordinator]
    repo_paths:
      vimcode: ~/src/vimcode
      quadraui: ~/src/quadraui
      claude-coordinator: ~/src/claude-coordinator

  # Desktop B — HP EliteBook, full GTK builds
  - name: elitebook
    host: john-hp-elitebook-830-g7-notebook-pc
    capabilities: [gtk, rust, python]
    repos: [vimcode, quadraui, claude-coordinator]
    repo_paths:
      vimcode: ~/src/vimcode
      quadraui: ~/src/quadraui
      claude-coordinator: ~/src/claude-coordinator

  # Server — Dell server, no display (no GTK builds)
  - name: dellserver
    host: dellserver
    capabilities: [rust, python]
    repos: [vimcode, quadraui, claude-coordinator]
    repo_paths:
      vimcode: ~/src/vimcode
      quadraui: ~/src/quadraui
      claude-coordinator: ~/src/claude-coordinator

  # Azure VM — lightweight, small tasks only (needs Claude CLI setup)
  - name: azure-vm
    host: vm-acme-dev-platform
    capabilities: [python]
    repos: [claude-coordinator]
    repo_paths:
      claude-coordinator: ~/src/claude-coordinator

concurrency:
  max_workers: 2          # max simultaneous claude -p sessions across all machines
  stagger_seconds: 30     # delay between starting workers
  backoff_base: 60        # seconds to wait on rate limit before retry
  max_retries: 3          # retries per dispatch on transient failures

hooks:
  on_round_complete:
    - summary_report
  on_session_end:
    - summary_report
  # close_merged_issues: disabled until adversarial review (#15) + smoke test
  # flow is in place. Issues should close on PR merge, not worker completion.

models:
  default: sonnet
  escalation: [haiku, sonnet, opus]
  labels:
    documentation: haiku
    bug: sonnet
    enhancement: sonnet
    infrastructure: opus
  # Pin each alias to an exact model id so the coordinator passes the exact
  # version to `claude -p --model <id>` instead of relying on the CLI's
  # latest-by-default. Aliases not listed here fall back to claude -p's pick.
  # versions:
  #   haiku:  claude-haiku-4-5-20251001
  #   sonnet: claude-sonnet-4-6
  #   opus:   claude-opus-4-7

# providers: worker-command backend registry (#322 / #323).
#
# When this block is absent, the coordinator behaves exactly as before:
# `default: claude` and an implicit `claude` definition spawn the usual
# `claude -p` worker.  Define additional providers here to route some
# repos or some assignments through a different backend.
#
# Precedence chain (highest → lowest):
#   AssignmentSpec.provider  →  Repo.provider  →  providers.default
#
# providers:
#   default: claude                 # name in `definitions` to use by default
#   definitions:
#     claude:                       # built-in; redefining is optional
#       type: claude                # only "claude" is supported today
#       binary: claude              # path/name of the worker binary
#       # model / extra_args / env are parsed but not yet wired into the
#       # spawn path — they will be honoured by the next #322 child issue.
#       model: sonnet               # optional: pin this provider to a model
#       extra_args: []              # optional: extra args appended to argv
#       env: {}                     # optional: extra env vars (${VAR} expanded)
#
#     # Example: a hypothetical alternative backend.  Pass per-repo with
#     # `provider: fast-claude` in the repo entry, or per-assignment with
#     # `--provider fast-claude` on `coord assign` (once wired).
#     fast-claude:
#       type: claude
#       binary: /opt/claude-fast/bin/claude
#       env:
#         ANTHROPIC_API_KEY: "${FAST_CLAUDE_KEY}"

