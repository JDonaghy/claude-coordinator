name: Rust tests

# Closes the gap documented in GOAL.md (2026-06-11):
#   "CI is pytest-only, so Rust repos (tui/quadraui/vimcode) still have no
#    automated gate; they need an explicit cargo build && cargo test gate."
# Issue #741 called for either resolving or tracking the gap — this resolves it
# for the coord-tui crate (the tui/ subdirectory of this repo).
#
# Path-dep note: tui/Cargo.toml has
#   quadraui = { path = "../../quadraui/quadraui", ... }
# which mirrors the local dev layout ~/src/claude-coordinator/ (sibling of
# ~/src/quadraui/).  On CI we replicate that layout by cloning quadraui to
# ../quadraui (relative to $GITHUB_WORKSPACE) via `git clone` — a plain shell
# step can write outside the workspace, unlike actions/checkout@v4 which
# enforces a workspace-relative path restriction.

on:
  push:
    branches: [main]
    paths:
      - 'tui/**'
  pull_request:
    branches: [main]
    paths:
      - 'tui/**'

jobs:
  cargo-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reproduce the sibling-directory layout that tui/Cargo.toml expects:
      #   quadraui = { path = "../../quadraui/quadraui" }
      # From tui/ that resolves to $GITHUB_WORKSPACE/../quadraui/quadraui.
      #
      # actions/checkout@v4 refuses any `path:` outside $GITHUB_WORKSPACE, so we
      # use a plain `git clone` instead — shell steps are not subject to that
      # restriction and can write to the parent directory freely.
      - name: Check out quadraui (sibling path dep)
        run: git clone https://github.com/${{ github.repository_owner }}/quadraui ../quadraui

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tui

      - name: cargo test (tui)
        working-directory: tui
        run: cargo test
