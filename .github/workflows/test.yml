name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest

  # #906: run the test suite in thin-client mode with COORD_STRICT_LOCAL_BOARD=1
  # so any board touch reachable from a thin-client path raises RuntimeError
  # instead of silently no-oping against an empty local DB.  This job catches
  # regressions that only manifest on a thin client (where the daemon holds the
  # canonical DB but the CLI/notify runs on a laptop without a local copy).
  thin-client-strict:
    runs-on: ubuntu-latest
    env:
      COORD_STRICT_LOCAL_BOARD: "1"
      # Simulate a thin-client: point board-service at a non-existent URL so
      # resolve_board_service() returns a non-None svc and the guard fires.
      # Tests that monkeypatch board-service themselves will override this.
      COORD_SERVICE_URL: "http://localhost:19999"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # Run only the audit + thin-client-specific tests to avoid hammering
      # the daemon-guarded paths in the full suite (which legitimately hit
      # local board state on the daemon host).
      #
      # #906: added test_thin_client_daemon_routing_906.py (daemon-routing +
      # fail-open coverage for the new endpoints/functions) and test_smoke.py
      # (reconcile()'s thin-client get_issue_test_mode regression) so this job
      # actually exercises COORD_STRICT_LOCAL_BOARD against the new #906
      # functions, not just the original build_board/save_board/load_board
      # triad.
      #
      # NOT added: test_state.py / test_review_verdict_relay.py. Both contain
      # tests that assert the *warn* (non-strict) behavior of the local-board
      # guard while simulating a thin client — under this job's ambient
      # COORD_STRICT_LOCAL_BOARD=1 those calls raise instead of warn and the
      # assertions fail, because the guard reads the env var directly rather
      # than a value those tests control. That's a pre-existing test-isolation
      # gap (COORD_STRICT_LOCAL_BOARD leaks in as ambient env instead of each
      # "warns" test forcing it unset), not something introduced by #906 —
      # tracked as a follow-up rather than fixed here to keep this PR's scope
      # to the review findings.
      - run: |
          pytest tests/test_thin_client_board_audit.py \
                 tests/test_state_review_findings_daemon.py \
                 tests/test_thin_client_daemon_routing_906.py \
                 tests/test_smoke.py \
                 -v

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coord/dashboard/webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
